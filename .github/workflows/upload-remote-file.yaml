name: Download and Publish Remote File

on:
  workflow_dispatch:
    inputs:
      remote_url:
        description: 'Remote file URL to download'
        required: true
        type: string
      asset_name:
        description: 'Name for the asset in release (optional, will use original filename if not provided)'
        required: false
        type: string
      tag_name:
        description: 'Tag name for the release (will create new if not exists)'
        required: true
        default: 'v1.0.0'
        type: string
      release_title:
        description: 'Title for the release'
        required: false
        default: 'Automated Release'
        type: string

jobs:
  download-and-publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.FORACTIONSONLY }}
      
      - name: Download file from remote URL
        run: curl -L -o downloaded_file.tmp "${{ github.event.inputs.remote_url }}"
          
      - name: Get file information
        id: file_info
        run: |
          FILE_SIZE=$(stat -c%s downloaded_file.tmp)
          ORIGINAL_NAME=$(basename "${{ github.event.inputs.remote_url }}")
          DOWNLOAD_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          # Use provided asset name or fallback to original filename
          ASSET_NAME="${{ github.event.inputs.asset_name }}"
          if [ -z "$ASSET_NAME" ]; then
            ASSET_NAME="$ORIGINAL_NAME"
          fi
          
          echo "file_size=$FILE_SIZE" >> $GITHUB_OUTPUT
          echo "original_name=$ORIGINAL_NAME" >> $GITHUB_OUTPUT
          echo "asset_name=$ASSET_NAME" >> $GITHUB_OUTPUT
          echo "download_time=$DOWNLOAD_TIME" >> $GITHUB_OUTPUT
          
          # Create metadata file
          echo "File Name: $ORIGINAL_NAME" > "metadata_${ORIGINAL_NAME}.txt"
          echo "Original URL: ${{ github.event.inputs.remote_url }}" >> "metadata_${ORIGINAL_NAME}.txt"
          echo "File Size: $FILE_SIZE bytes" >> "metadata_${ORIGINAL_NAME}.txt"
          echo "Download Time: $DOWNLOAD_TIME" >> "metadata_${ORIGINAL_NAME}.txt"
          echo "Asset Name: $ASSET_NAME" >> "metadata_${ORIGINAL_NAME}.txt"
          
      - name: Rename downloaded file
        run: mv downloaded_file.tmp "${{ steps.file_info.outputs.asset_name }}"
          
      - name: Create or update release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.event.inputs.release_title }}
          tag_name: ${{ github.event.inputs.tag_name }}
          body: |
            Automated release containing file from ${{ github.event.inputs.remote_url }}
            
            File Details:
            - Original Name: ${{ steps.file_info.outputs.original_name }}
            - Asset Name: ${{ steps.file_info.outputs.asset_name }}
            - Size: ${{ steps.file_info.outputs.file_size }} bytes
            - Downloaded at: ${{ steps.file_info.outputs.download_time }}
          files: |
            ${{ steps.file_info.outputs.asset_name }}
            metadata_${{ steps.file_info.outputs.original_name }}.txt
          token: ${{ secrets.FORACTIONSONLY }}
          draft: false
          prerelease: false
          
      - name: Summary
        run: |
          echo "## File Publication Summary" >> $GITHUB_STEP_SUMMARY
          echo "- File: ${{ steps.file_info.outputs.asset_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Size: ${{ steps.file_info.outputs.file_size }} bytes" >> $GITHUB_STEP_SUMMARY
          echo "- Downloaded at: ${{ steps.file_info.outputs.download_time }}" >> $GITHUB_STEP_SUMMARY
          echo "- Released as asset to: ${{ github.event.inputs.tag_name }}" >> $GITHUB_STEP_SUMMARY
