name: Download and Upload Remote File

on:
  workflow_dispatch:
    inputs:
      remote_url:
        description: 'Remote file URL to download'
        required: true
        type: string
      target_path:
        description: 'Target path in repository to save the file'
        required: false
        default: 'uploaded_files/'
        type: string

jobs:
  download-upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.FORACTIONSONLY }}
      
      - name: Create target directory
        run: mkdir -p "${{ github.event.inputs.target_path }}"
          
      - name: Download file from remote URL
        run: curl -L -o downloaded_file.tmp "${{ github.event.inputs.remote_url }}"
          
      - name: Get file information
        id: file_info
        run: |
          FILE_SIZE=$(stat -c%s downloaded_file.tmp)
          FILE_NAME=$(basename "${{ github.event.inputs.remote_url }}")
          DOWNLOAD_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          echo "file_size=$FILE_SIZE" >> $GITHUB_OUTPUT
          echo "file_name=$FILE_NAME" >> $GITHUB_OUTPUT
          echo "download_time=$DOWNLOAD_TIME" >> $GITHUB_OUTPUT
          
          # Create metadata file
          echo "File Name: $FILE_NAME" > "${{ github.event.inputs.target_path }}/metadata_${FILE_NAME}.txt"
          echo "Original URL: ${{ github.event.inputs.remote_url }}" >> "${{ github.event.inputs.target_path }}/metadata_${FILE_NAME}.txt"
          echo "File Size: $FILE_SIZE bytes" >> "${{ github.event.inputs.target_path }}/metadata_${FILE_NAME}.txt"
          echo "Download Time: $DOWNLOAD_TIME" >> "${{ github.event.inputs.target_path }}/metadata_${FILE_NAME}.txt"
          
      - name: Move file to target location
        run: mv downloaded_file.tmp "${{ github.event.inputs.target_path }}/${{ steps.file_info.outputs.file_name }}"
          
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Upload file from ${{ github.event.inputs.remote_url }} | Size: ${{ steps.file_info.outputs.file_size }} bytes"
            git push
          else
            echo "No changes to commit"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.FORACTIONSONLY }}
          
      - name: Summary
        run: |
          echo "## File Upload Summary" >> $GITHUB_STEP_SUMMARY
          echo "- File: ${{ steps.file_info.outputs.file_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Size: ${{ steps.file_info.outputs.file_size }} bytes" >> $GITHUB_STEP_SUMMARY
          echo "- Downloaded at: ${{ steps.file_info.outputs.download_time }}" >> $GITHUB_STEP_SUMMARY
