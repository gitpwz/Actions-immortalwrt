name: 🔄 Retry Release

on:
  workflow_dispatch:
    inputs:
      artifact_name:
        description: 'Artifact name (e.g. openwrt-firmware__202603191537)'
        required: true
        type: string
      tag_name:
        description: 'Git tag for release (e.g. 2026.03.19-1537)'
        required: true
        type: string

jobs:
  retry-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: /home/runner/work/Actions-immortalwrt/Actions-immortalwrt/openwrt/bin/targets/msm89xx/msm8916
      - name: Display structure of downloaded files
        run: ls -R /home/runner/work/Actions-immortalwrt/Actions-immortalwrt/openwrt/bin/targets/msm89xx/msm8916
    
      - name: Create Release and upload files
        uses: ncipollo/release-action@main
        with:
          token: ${{ secrets.ForActionsOnly }}  # 必须用 PAT！
          tag: ${{ github.event.inputs.tag_name }}
          artifacts: "**/*"
          allowUpdates: true
          draft: false
